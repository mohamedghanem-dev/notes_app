plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
    id "kotlin-android"
}

android {
    namespace "com.smartboard.app"
    compileSdk 34

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    defaultConfig {
        applicationId "com.smartboard.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

flutter {
    source '../..'
}
